name: Lint Code and Design Tokens

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('solution-system/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Nx cache
        uses: actions/cache@v4
        with:
          path: solution-system/.nx/cache
          key: ${{ runner.os }}-nx-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: |
          cd solution-system
          bun install --frozen-lockfile

      - name: Run Linters
        run: |
          cd solution-system
          bun run lint



