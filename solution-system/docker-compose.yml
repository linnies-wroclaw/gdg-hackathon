services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT_HOST:-4200}:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      ADK_AGENT_URL: http://adk-agent:8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: solution_system
    ports:
      - "${API_PORT_HOST:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      adk-agent:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solution_system
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solution_system"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s

  adk-agent:
    build:
      context: ./adg-agents
    environment:
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      GEMINI_API_KEY: ${GOOGLE_API_KEY:-}
      MCP_SERVER_URL: http://mcp-server:8000/mcp
    ports:
      - "${ADK_PORT_HOST:-8081}:8081"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('net').createConnection(8081,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s
    depends_on:
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      context: ./mcp-server
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_NAME: ${MCP_NAME:-triz-mcp-server}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
    ports:
      - "${MCP_PORT_HOST:-8000}:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()"
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
