services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      ADK_AGENT_URL: http://adk-agent:8081
    ports:
      - "3000:3000"
    depends_on:
      adk-agent:
        condition: service_healthy

  adk-agent:
    build:
      context: ./adg-agents
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      GEMINI_API_KEY: ${GOOGLE_GENAI_API_KEY:-}
      MCP_SERVER_URL: http://mcp-server:8000/mcp
    ports:
      - "8081:8081"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('net').createConnection(8081,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s
    depends_on:
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      context: ./mcp-server
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()"
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
