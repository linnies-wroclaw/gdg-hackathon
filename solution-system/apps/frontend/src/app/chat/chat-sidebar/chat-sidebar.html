<aside class="chat__sidebar" aria-label="Conversations">
  <div class="chat__sidebar-header">
    <h1 class="chat__title">Solution system</h1>
    <button
      class="chat__new"
      type="button"
      [disabled]="chat.pending()"
      (click)="createChat()"
    >
      New chat
    </button>
    <a class="chat__design-system" href="/design-system.html">
      Design system
    </a>
  </div>

  <nav class="chat__list" aria-label="Chat history">
    @if (chat.chats().length === 0) {
      <p class="chat__empty-list">No saved chats yet.</p>
    }

    @for (item of chat.chats(); track item.id) {
      <button
        class="chat__list-item"
        type="button"
        [class.chat__list-item--active]="item.id === chat.selectedChatId()"
        [attr.aria-current]="item.id === chat.selectedChatId() ? 'page' : null"
        [disabled]="chat.pending()"
        (click)="selectChat(item.id)"
      >
        {{ item.title }}
      </button>
    }
  </nav>
</aside>
